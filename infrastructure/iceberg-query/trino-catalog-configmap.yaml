apiVersion: v1
kind: ConfigMap
metadata:
  name: trino-catalog-config
  namespace: monitoring
data:
  config.properties: |
    coordinator=true
    node-scheduler.include-coordinator=true
    http-server.http.port=8080
    query.max-memory=512MB
    query.max-memory-per-node=256MB
    discovery.uri=http://localhost:8080

  jvm.config: |
    -server
    -Xmx2G
    -XX:+UseG1GC
    -XX:G1HeapRegionSize=32M
    -XX:+UseGCOverheadLimit
    -XX:+ExplicitGCInvokesConcurrent
    -XX:+HeapDumpOnOutOfMemoryError
    -XX:+ExitOnOutOfMemoryError

  node.properties: |
    node.environment=production
    node.data-dir=/var/trino/data
    node.id=trino-homelab-001

  # Iceberg catalog via Lakekeeper REST catalog
  # Property names for Trino 468: iceberg.rest-catalog.uri (not iceberg.rest.uri)
  iceberg.properties: |
    connector.name=iceberg
    iceberg.catalog.type=rest
    iceberg.rest-catalog.uri=http://lakekeeper.monitoring.svc.cluster.local:8181/catalog
    fs.native-s3.enabled=true
    s3.endpoint=https://s3.fr-par.scw.cloud
    s3.region=fr-par
    s3.aws-access-key=${ENV:AWS_ACCESS_KEY_ID}
    s3.aws-secret-key=${ENV:AWS_SECRET_ACCESS_KEY}
    s3.path-style-access=true

  memory.properties: |
    connector.name=memory
    memory.max-data-per-node=128MB
