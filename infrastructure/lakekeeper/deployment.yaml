apiVersion: apps/v1
kind: Deployment
metadata:
  name: lakekeeper
  namespace: monitoring
  labels:
    app.kubernetes.io/name: lakekeeper
    app.kubernetes.io/component: iceberg-catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lakekeeper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lakekeeper
    spec:
      # Lakekeeper uses the same S3 endpoint → same IPv6 workaround
      hostAliases:
        - ip: "51.159.62.18"
          hostnames: ["s3.fr-par.scw.cloud"]
      initContainers:
        - name: migrate
          image: quay.io/lakekeeper/catalog:latest
          command: ["migrate"]
          env:
            - name: LAKEKEEPER__PG_DATABASE_URL_READ
              value: "postgresql://lakekeeper:$(POSTGRES_PASSWORD)@lakekeeper-pg.monitoring.svc.cluster.local:5432/lakekeeper"
            - name: LAKEKEEPER__PG_DATABASE_URL_WRITE
              value: "postgresql://lakekeeper:$(POSTGRES_PASSWORD)@lakekeeper-pg.monitoring.svc.cluster.local:5432/lakekeeper"
            - name: LAKEKEEPER__PG_ENCRYPTION_KEY
              value: "homelab-iceberg-encryption-key-32b"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lakekeeper-secrets
                  key: postgres-password
      containers:
        - name: lakekeeper
          image: quay.io/lakekeeper/catalog:latest
          command: ["serve"]
          ports:
            - name: http
              containerPort: 8181
          env:
            - name: LAKEKEEPER__PG_DATABASE_URL_READ
              value: "postgresql://lakekeeper:$(POSTGRES_PASSWORD)@lakekeeper-pg.monitoring.svc.cluster.local:5432/lakekeeper"
            - name: LAKEKEEPER__PG_DATABASE_URL_WRITE
              value: "postgresql://lakekeeper:$(POSTGRES_PASSWORD)@lakekeeper-pg.monitoring.svc.cluster.local:5432/lakekeeper"
            - name: LAKEKEEPER__PG_ENCRYPTION_KEY
              value: "homelab-iceberg-encryption-key-32b"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lakekeeper-secrets
                  key: postgres-password
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: tansu-secrets
                  key: s3-access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: tansu-secrets
                  key: s3-secret-key
            - name: AWS_ENDPOINT
              value: "https://s3.fr-par.scw.cloud"
            - name: AWS_DEFAULT_REGION
              value: "fr-par"
            - name: AWS_EC2_METADATA_DISABLED
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8181
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
