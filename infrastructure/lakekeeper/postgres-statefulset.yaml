apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lakekeeper-pg
  namespace: monitoring
  labels:
    app.kubernetes.io/name: lakekeeper-pg
    app.kubernetes.io/component: database
spec:
  serviceName: lakekeeper-pg
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lakekeeper-pg
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lakekeeper-pg
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          env:
            - name: POSTGRES_DB
              value: lakekeeper
            - name: POSTGRES_USER
              value: lakekeeper
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lakekeeper-secrets
                  key: postgres-password
            - name: PGUSER
              value: lakekeeper
          ports:
            - name: postgres
              containerPort: 5432
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            exec:
              command: [pg_isready]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pg-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
