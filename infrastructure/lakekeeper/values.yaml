# Lakekeeper Helm chart values — homelab
# Chart: https://lakekeeper.github.io/lakekeeper-charts/

# Use core edition (no license required)
lakekeeper:
  edition: "core"

catalog:
  image:
    repository: quay.io/lakekeeper/catalog
    tag: latest
    pullPolicy: Always

  replicas: 1

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Pass AWS/S3 config as environment variables
  extraEnv:
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: tansu-secrets
          key: s3-access-key
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: tansu-secrets
          key: s3-secret-key
    - name: AWS_ENDPOINT
      value: "https://s3.fr-par.scw.cloud"
    - name: AWS_DEFAULT_REGION
      value: "fr-par"
    - name: AWS_EC2_METADATA_DISABLED
      value: "true"

  readinessProbe:
    enabled: true
    initialDelaySeconds: 20
    periodSeconds: 10
    failureThreshold: 5

  livenessProbe:
    enabled: true
    initialDelaySeconds: 1
    periodSeconds: 5
    failureThreshold: 5

  service:
    type: ClusterIP
    externalPort: 8181

# Embedded PostgreSQL via groundhog2k/postgres subchart
postgresql:
  enabled: true
  # fullnameOverride ensures the service is named exactly "lakekeeper-pg"
  # so the catalog can find it via the parent's fullname helper
  fullnameOverride: "lakekeeper-pg"

  service:
    port: 5432

  userDatabase:
    name:
      value: "lakekeeper"
    user:
      value: "lakekeeper"
    password:
      value: "changeme-lakekeeper"

  storage:
    requestedSize: 5Gi
    accessModes:
      - ReadWriteOnce

# Secret backend — store encrypted secrets in Postgres
secretBackend:
  type: "Postgres"
  postgres:
    encryptionKeySecret: "lakekeeper-secrets"
    encryptionKeySecretKey: "encryptionKey"

# Authorization — allow all (homelab)
authz:
  backend: "allowall"

# No auth in homelab
auth: {}
