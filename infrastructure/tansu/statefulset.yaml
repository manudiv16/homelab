apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tansu-broker
  namespace: monitoring
  labels:
    app.kubernetes.io/name: tansu
    app.kubernetes.io/component: broker
spec:
  serviceName: tansu-broker
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tansu
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tansu
    spec:
      serviceAccountName: tansu-broker
      containers:
        - name: tansu
          image: ghcr.io/tansu-io/tansu:0.2.2
          # El binary es tansu-server (entrypoint del container).
          # En esta build NO hay subcomandos (broker/iceberg/cat/etc).
          # Los args se pasan directamente:
          args:
            - --kafka-cluster-id=homelab
            - --kafka-listener-url=tcp://0.0.0.0:9092
            - --kafka-advertised-listener-url=tcp://tansu-broker.monitoring.svc.cluster.local:9092
            - --storage-engine=memory://tansu/
          ports:
            - name: kafka
              containerPort: 9092
              protocol: TCP
            - name: metrics
              containerPort: 9100
              protocol: TCP
          env:
            - name: RUST_LOG
              value: "warn,tansu_broker=info"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: tansu-secrets
                  key: s3-access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: tansu-secrets
                  key: s3-secret-key
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: tansu-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
