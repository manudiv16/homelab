apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tansu-broker
  namespace: monitoring
  labels:
    app.kubernetes.io/name: tansu
    app.kubernetes.io/component: broker
spec:
  serviceName: tansu-broker
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tansu
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tansu
    spec:
      serviceAccountName: tansu-broker
      # IPv6 fix: el cluster k3s no tiene routing IPv6. Scaleway S3 publica
      # AAAA records y el cliente Rust hyper (Happy Eyeballs) intenta IPv6
      # primero y queda bloqueado en timeout.
      # hostAliases resuelve las 3 IPs IPv4 de s3.fr-par.scw.cloud directamente
      # sin pasar por DNS, evitando el problema de forma simple y fiable.
      # Si Scaleway rotase estas IPs se actualizan aquí (poco frecuente en CDN).
      # El CoreDNS template (kube-system/coredns-custom) bloquea AAAA
      # como defensa en profundidad para el resto del cluster.
      # Una sola IP es suficiente — Scaleway usa anycast/CDN redundante.
      # Las 3 IPs (51.159.62.18/19/20) pertenecen al mismo servicio.
      hostAliases:
        - ip: "51.159.62.18"
          hostnames: ["s3.fr-par.scw.cloud"]
      containers:
        - name: tansu
          image: ghcr.io/tansu-io/tansu:0.6.0
          args:
            - --cluster-id=homelab
            - --listener-url=tcp://0.0.0.0:9092
            - --advertised-listener-url=tcp://tansu-broker.monitoring.svc.cluster.local:9092
            - --storage-engine=s3://local-logs/tansu/
          ports:
            - name: kafka
              containerPort: 9092
              protocol: TCP
            - name: metrics
              containerPort: 9100
              protocol: TCP
          env:
            - name: RUST_LOG
              value: "warn,tansu_broker=info"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: tansu-secrets
                  key: s3-access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: tansu-secrets
                  key: s3-secret-key
            - name: AWS_ENDPOINT
              value: "https://s3.fr-par.scw.cloud"
            - name: AWS_DEFAULT_REGION
              value: "fr-par"
            - name: AWS_ALLOW_HTTP
              value: "false"
            # Deshabilita el intento de obtener credenciales via IMDS (EC2
            # instance metadata). Sin esto object_store tarda ~57s en agotar
            # los reintentos al metadata service antes de usar las credenciales
            # estáticas. TODO: eliminar cuando se configure IPv6 en k3s.
            - name: AWS_EC2_METADATA_DISABLED
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 30

        # TODO: Sidecar tansu iceberg (Iceberg writer) requires schema
        # registry to be configured so Tansu can map topic data to Arrow types.
        # Will be added once a schema is registered for the otel-logs topic.
        # See: https://docs.tansu.io/docs/iceberg
