apiVersion: v1
kind: Service
metadata:
  name: tansu-broker
  namespace: monitoring
  labels:
    app.kubernetes.io/name: tansu
    app.kubernetes.io/component: broker
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tansu
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: kafka
      port: 9092
      targetPort: 9092
      protocol: TCP
    - name: metrics
      port: 9100
      targetPort: 9100
      protocol: TCP
