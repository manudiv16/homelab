apiVersion: v1
kind: ServiceAccount
metadata:
  name: tansu-broker
  namespace: monitoring
  labels:
    app.kubernetes.io/name: tansu
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tansu-broker
  namespace: monitoring
  labels:
    app.kubernetes.io/name: tansu
rules:
  # Tansu doesn't need k8s API access for core operations.
  # Minimal permissions for readiness/liveness probes and metadata discovery.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tansu-broker
  namespace: monitoring
  labels:
    app.kubernetes.io/name: tansu
subjects:
  - kind: ServiceAccount
    name: tansu-broker
    namespace: monitoring
roleRef:
  kind: Role
  name: tansu-broker
  apiGroup: rbac.authorization.k8s.io
