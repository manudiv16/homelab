apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tansu-pg
  namespace: monitoring
  labels:
    app.kubernetes.io/name: tansu-pg
    app.kubernetes.io/component: postgres
spec:
  serviceName: tansu-pg
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tansu-pg
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tansu-pg
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: tansu
            - name: POSTGRES_USER
              value: tansu
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tansu-secrets
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "tansu"]
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: pg-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
