apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: collector-daemonset
  namespace: monitoring
spec:
  mode: daemonset
  serviceAccount: otel-collector-daemonset
  image: otel/opentelemetry-collector-contrib:0.123.0
  resources:
    requests:
      cpu: 150m
      memory: 200Mi
    limits:
      cpu: 500m
      memory: 600Mi

  # HostPath volumes for filelog receiver offset tracking
  # and container log access
  volumes:
    - name: varlog
      hostPath:
        path: /var/log
    - name: varlibdockercontainers
      hostPath:
        path: /var/lib/docker/containers
    - name: otel-registry
      hostPath:
        path: /var/lib/otel/registry
        type: DirectoryOrCreate
  volumeMounts:
    - name: varlog
      mountPath: /var/log
      readOnly: true
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true
    - name: otel-registry
      mountPath: /var/lib/otel

  config:
    receivers:
      # ── Existing receivers (unchanged) ──
      hostmetrics:
        collection_interval: 30s
        scrapers:
          cpu: {}
          memory: {}
          disk: {}
          network: {}
      kubeletstats:
        collection_interval: 30s
        auth_type: serviceAccount
        endpoint: ${env:K8S_NODE_NAME}:10250
        insecure_skip_verify: true
        metrics:
          # Disable deprecated cpu.utilization metrics — replaced by cpu.usage.
          container.cpu.utilization:
            enabled: false
          k8s.node.cpu.utilization:
            enabled: false
          k8s.pod.cpu.utilization:
            enabled: false
          # Enable the new cpu.usage metric.
          container.cpu.usage:
            enabled: true

      # ── filelog receiver: raw container logs → Kafka directo.
      # Sin parsers ni transformaciones — todo lo hace Arroyo.
      filelog:
        include:
          - /var/log/containers/*.log
        exclude:
          - /var/log/containers/fluentbit-*.log
          - /var/log/containers/collector-daemonset-*.log

    # No extensions needed for MVP.
    # file_storage extension requires write access that the collector's
    # non-root user may not have. filelog uses in-memory offset tracking.
    extensions: {}

    processors:
      # ── Existing processors (shared by metrics and logs) ──
      memory_limiter:
        check_interval: 5s
        limit_mib: 500
        spike_limit_mib: 150
      batch:
        timeout: 10s
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.container.name
            - k8s.node.name
            - k8s.deployment.name
      resource/cluster:
        attributes:
          - key: cluster.name
            value: homelab
            action: upsert

    exporters:
      # ── Existing exporter (metrics → gateway, unchanged) ──
      otlp:
        endpoint: otel-gateway-collector:4317
        tls:
          insecure: true

      # ── Logs exporter: OTLP Protobuf → Tansu (Kafka) ──
      # OTel exporta logs en formato OTLP Protobuf nativo al topic 'otel-logs'.
      # El normalizer consume de este topic, aplana los registros y escribe
      # Protobuf plano a otro topic para que k2i lo cargue con schema tipado.
      kafka/tansu:
        brokers:
          - tansu-broker:9092
        topic: otel-logs
        encoding: otlp_proto
        protocol_version: 2.0.0
        metadata:
          retry:
            max: 10
            backoff: 3s
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
        sending_queue:
          enabled: true
          queue_size: 5000
          num_consumers: 4

    service:
      extensions: []
      pipelines:
        # Existing metrics pipeline (unchanged)
        metrics:
          receivers:
            - hostmetrics
            - kubeletstats
          processors:
            - memory_limiter
            - k8sattributes
            - resource/cluster
            - batch
          exporters:
            - otlp
        # Logs pipeline — OTLP Protobuf → Tansu → normalizer → k2i
        logs:
          receivers:
            - filelog
          processors:
            - memory_limiter
            - k8sattributes
            - resource/cluster
            - batch
          exporters:
            - kafka/tansu
      telemetry:
        metrics:
          address: 0.0.0.0:8888
