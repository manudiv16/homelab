apiVersion: batch/v1
kind: CronJob
metadata:
  name: parquet-compactor-hourly
  namespace: monitoring
  labels:
    app.kubernetes.io/name: parquet-compactor
    app.kubernetes.io/component: hourly
spec:
  # Runs at xx:15 every hour, compacts the just-completed hour.
  schedule: "15 * * * *"
  timeZone: "Etc/UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: parquet-compactor
            app.kubernetes.io/component: hourly
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          containers:
            - name: compactor
              image: python:3.14-slim
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  echo "==> installing deps"
                  pip install --quiet --no-cache-dir --user boto3==1.43.5 duckdb==1.5.2
                  echo "==> running compactor (mode=$MODE)"
                  exec python /script/compactor.py
              env:
                - name: MODE
                  value: "hourly"
                - name: S3_ENDPOINT
                  value: "http://192.168.4.76:3900"
                - name: S3_REGION
                  value: "garage"
                - name: BUCKET_NAME
                  value: "logs"
                - name: CATEGORIES
                  value: "containers"
                - name: DELETE_FILES
                  value: "true"
                - name: WATERMARK_ENABLED
                  value: "true"
                - name: HOURLY_PREFIX
                  value: "hourly"
                - name: PATH
                  value: "/home/compactor/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
                - name: HOME
                  value: "/home/compactor"
              envFrom:
                - secretRef:
                    name: parquet-compactor-credentials
              volumeMounts:
                - name: script
                  mountPath: /script
                - name: home
                  mountPath: /home/compactor
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 1
                  memory: 1Gi
          volumes:
            - name: script
              configMap:
                name: parquet-compactor-script
                defaultMode: 0555
            - name: home
              emptyDir: {}
            - name: tmp
              emptyDir: {}
