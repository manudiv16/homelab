apiVersion: batch/v1
kind: CronJob
metadata:
  name: parquet-compactor-hourly
  namespace: monitoring
  labels:
    app.kubernetes.io/name: parquet-compactor
    app.kubernetes.io/component: hourly
spec:
  # Runs at xx:15 every hour, compacts the just-completed hour.
  schedule: "15 * * * *"
  timeZone: "Etc/UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: parquet-compactor
            app.kubernetes.io/component: hourly
        spec:
          restartPolicy: OnFailure
          containers:
            - name: compactor
              image: ghcr.io/heldroe/parquet-compactor:sha-14b9322
              command: ["python", "/script/compactor.py"]
              env:
                - name: MODE
                  value: "hourly"
                - name: S3_ENDPOINT
                  value: "https://s3.fr-par.scw.cloud"
                - name: S3_REGION
                  value: "fr-par"
                - name: BUCKET_NAME
                  value: "local-logs"
                - name: CATEGORIES
                  value: "containers,events"
                - name: DELETE_FILES
                  value: "true"
                - name: WATERMARK_ENABLED
                  value: "true"
                - name: HOURLY_PREFIX
                  value: "hourly"
              envFrom:
                - secretRef:
                    name: parquet-compactor-credentials
              volumeMounts:
                - name: script
                  mountPath: /script
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 1
                  memory: 1Gi
          volumes:
            - name: script
              configMap:
                name: parquet-compactor-script
                defaultMode: 0555
            - name: tmp
              emptyDir: {}