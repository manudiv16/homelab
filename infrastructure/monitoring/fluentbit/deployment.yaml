apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluentbit-aggregator
  namespace: monitoring
  labels:
    app.kubernetes.io/name: fluentbit-aggregator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fluentbit-aggregator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fluentbit-aggregator
    spec:
      containers:
        - name: fluentbit
          image: fluent/fluent-bit:4.1.1
          ports:
            - containerPort: 24224
              name: fluent-forward
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc
            - name: scripts
              mountPath: /fluent-bit/scripts
            - name: buffers
              mountPath: /var/fluent-bit/buffers
          env:
            - name: GARAGE_S3_ENDPOINT
              value: "http://192.168.4.76:3900"
            - name: GARAGE_BUCKET
              value: "logs"
          envFrom:
            - secretRef:
                name: garage-credentials
      volumes:
        - name: config
          configMap:
            name: fluentbit-aggregator-config
        - name: scripts
          configMap:
            name: fluentbit-aggregator-config
            items:
              - key: filter.lua
                path: filter.lua
        - name: buffers
          emptyDir: {}
