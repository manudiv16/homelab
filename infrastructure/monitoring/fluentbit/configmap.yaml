apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentbit-aggregator-config
  namespace: monitoring
data:
  fluent-bit.conf: |
    # ==============================================================
    # Fluentbit Aggregator Configuration
    # Receives logs from OTel Gateway via OpenTelemetry protocol
    # Writes Parquet files to Garage (S3) with Hive partitioning
    # ==============================================================

    [SERVICE]
        flush           5
        daemon          off
        log_level       info
        parsers_file    parsers.conf
        plugins_file    plugins.conf
        http_server     on
        http_listen     0.0.0.0
        http_port       2020
        # Storage for buffering before S3 upload
        storage.path              /var/fluent-bit/buffers
        storage.sync              normal
        storage.checksum          off
        storage.backlog.mem_limit 50M

    # ---- Input: OpenTelemetry from OTel Gateway ----
    [INPUT]
        Name              opentelemetry
        Listen            0.0.0.0
        Port              4318
        # Buffer settings for OTLP HTTP
        Buffer_Chunk_Size 1M
        Buffer_Max_Size   5M

    # ---- Output: S3 (Garage) with Parquet format ----
    [OUTPUT]
        Name                  s3
        Match                 logs.*
        bucket                ${GARAGE_BUCKET}
        region                garage
        endpoint              ${GARAGE_S3_ENDPOINT}
        tls                   off
        tls.verify            off
        use_put_object        On
        # Parquet compression via Apache Arrow (AWS image bundles Arrow)
        compression           parquet
        # Hive-style partitioning
        s3_key_format         /raw/containers/year=%Y/month=%m/day=%d/hour=%H/$UUID.parquet
        # Buffering: flush every 5MB or every 5 minutes
        total_file_size       5M
        upload_timeout        5m
        # S3 credentials from environment (injected via Secret)

  parsers.conf: |
    # No custom parsers needed — OTel Gateway sends structured Fluent Forward records

  plugins.conf: |
    # No additional plugin loading needed
