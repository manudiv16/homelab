apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentbit-aggregator-config
  namespace: monitoring
data:
  fluent-bit.conf: |
    # ==============================================================
    # Fluentbit Aggregator Configuration
    # Receives logs from Fluentbit DaemonSet via Forward protocol
    # Writes Parquet files to Scaleway S3 with Hive partitioning
    # ==============================================================

    [SERVICE]
        flush           5
        daemon          off
        log_level       info
        parsers_file    parsers.conf
        plugins_file    plugins.conf
        http_server     on
        http_listen     0.0.0.0
        http_port       2020
        # Storage for buffering before S3 upload
        storage.path              /var/fluent-bit/buffers
        storage.sync              normal
        storage.checksum          off
        storage.backlog.mem_limit 50M

    # ---- Input: Forward from Fluentbit DaemonSet ----
    [INPUT]
        Name              forward
        Listen            0.0.0.0
        Port              24224
        Buffer_Chunk_Size 1M
        Buffer_Max_Size   5M

    # ---- Filter: Rewrite tag to separate log categories ----
    [FILTER]
        Name          rewrite_tag
        Match         kube.*
        Rule          $pod ^.*$ containers false

    # ---- Filter: Rename message -> log for container logs ----
    # (AWS CRI parser names the log field 'message' instead of 'log')
    [FILTER]
        Name          modify
        Match         containers
        Rename        message         log

    # ---- Filter: Enforce fixed Parquet schema for containers ----
    [FILTER]
        Name          record_modifier
        Match         containers
        Allowlist_key time
        Allowlist_key id
        Allowlist_key namespace
        Allowlist_key pod
        Allowlist_key container
        Allowlist_key node
        Allowlist_key log

    # ---- Filter: Enforce fixed Parquet schema for events ----
    [FILTER]
        Name          record_modifier
        Match         kube_events
        Allowlist_key id
        Allowlist_key namespace
        Allowlist_key object_name
        Allowlist_key object_kind
        Allowlist_key action
        Allowlist_key reason
        Allowlist_key message
        Allowlist_key type

    # ---- Output: S3 (Scaleway) - containers ----
    [OUTPUT]
        Name                  s3
        Match                 containers
        bucket                ${S3_BUCKET}
        region                fr-par
        endpoint              s3.fr-par.scw.cloud
        tls                   on
        tls.verify            on
        Total_File_Size       5M
        Upload_Timeout        5m
        store_dir             /tmp/fluent-bit/s3-containers
        use_put_object        On
        compression           parquet
        s3_key_format         /raw/containers/year=%Y/month=%m/day=%d/hour=%H/$UUID.parquet
        json_date_key         time

    # ---- Output: S3 (Scaleway) - events ----
    [OUTPUT]
        Name                  s3
        Match                 kube_events
        bucket                ${S3_BUCKET}
        region                fr-par
        endpoint              s3.fr-par.scw.cloud
        tls                   on
        tls.verify            on
        Total_File_Size       5M
        Upload_Timeout        5m
        store_dir             /tmp/fluent-bit/s3-events
        use_put_object        On
        compression           parquet
        s3_key_format         /raw/events/year=%Y/month=%m/day=%d/hour=%H/$UUID.parquet
        json_date_key         time

  parsers.conf: |
    # No custom parsers needed — Aggregator receives structured records from DaemonSet

  plugins.conf: |
    # No additional plugin loading needed
