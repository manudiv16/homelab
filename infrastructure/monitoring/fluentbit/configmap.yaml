apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentbit-aggregator-config
  namespace: monitoring
data:
  fluent-bit.conf: |
    # ==============================================================
    # Fluentbit Aggregator Configuration
    # Receives logs from Fluentbit DaemonSet via Forward protocol
    # Writes Parquet files to Garage (S3) with Hive partitioning
    # ==============================================================

    [SERVICE]
        flush           5
        daemon          off
        log_level       info
        parsers_file    parsers.conf
        plugins_file    plugins.conf
        http_server     on
        http_listen     0.0.0.0
        http_port       2020
        # Storage for buffering before S3 upload
        storage.path              /var/fluent-bit/buffers
        storage.sync              normal
        storage.checksum          off
        storage.backlog.mem_limit 50M

    # ---- Input: Forward from Fluentbit DaemonSet ----
    [INPUT]
        Name              forward
        Listen            0.0.0.0
        Port              24224
        Buffer_Chunk_Size 1M
        Buffer_Max_Size   5M

    # ---- Filter: Rewrite tag to separate log categories ----
    [FILTER]
        Name          rewrite_tag
        Match         kube.*
        Rule          \$pod ^.*$ containers false

    # ---- Output: S3 (Garage) with Parquet compression ----
    [OUTPUT]
        Name                  s3
        Match                 containers
        bucket                ${GARAGE_BUCKET}
        region                garage
        endpoint              ${GARAGE_S3_ENDPOINT}
        tls                   off
        tls.verify            off
        Total_File_Size       5M
        Upload_Timeout        5m
        store_dir             /tmp/fluent-bit/s3
        use_put_object        On
        compression           parquet
        s3_key_format         /raw/containers/year=%Y/month=%m/day=%d/hour=%H/$UUID.parquet
        # S3 credentials from environment (injected via Secret)

  parsers.conf: |
    # No custom parsers needed — Aggregator receives structured records from DaemonSet

  plugins.conf: |
    # No additional plugin loading needed
