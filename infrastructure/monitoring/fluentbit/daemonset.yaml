apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentbit-daemonset
  namespace: monitoring
  labels:
    app.kubernetes.io/name: fluentbit-daemonset
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fluentbit-daemonset
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fluentbit-daemonset
    spec:
      serviceAccountName: fluentbit-daemonset
      containers:
        - name: fluentbit
          image: fluent/fluent-bit:4.1.1
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: run
              mountPath: /run/log
              readOnly: true
            - name: fluentbitdb
              mountPath: /var/fluent-bit
      volumes:
        - name: config
          configMap:
            name: fluentbit-daemonset-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: run
          hostPath:
            path: /run/log
        - name: fluentbitdb
          hostPath:
            path: /var/fluent-bit
            type: DirectoryOrCreate
