apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentbit-daemonset-config
  namespace: monitoring
data:
  fluent-bit.conf: |
    # ==============================================================
    # Fluentbit DaemonSet Configuration
    # Reads container logs via tail input
    # Enriches with Kubernetes metadata
    # Forwards to Aggregator via Forward protocol
    # ==============================================================

    [SERVICE]
        flush           5
        daemon          off
        log_level       info
        parsers_file    /fluent-bit/parsers/parsers.conf
        http_server     off
        http_port       2020

    # ---- Input: Read container logs from host filesystem ----
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            cri
        DB                /var/fluent-bit/fluentbit.db
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    # ---- Filter: Enrich with Kubernetes metadata ----
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Annotations         Off
        Labels              Off
        Buffer_Size         0

    # ---- Output: Forward to Aggregator ----
    [OUTPUT]
        Name              forward
        Match             kube.*
        Host              fluentbit-aggregator
        Port              24224
        Retry_Limit       10
