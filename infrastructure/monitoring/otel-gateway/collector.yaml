apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-gateway
  namespace: monitoring
spec:
  mode: statefulset
  replicas: 1
  serviceAccount: otel-collector-gateway
  image: otel/opentelemetry-collector-contrib:0.123.0
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      memory: 1Gi
  targetAllocator:
    enabled: false
  env:
    - name: ENABLE_FEATURE_GATES
      value: receiver.kubeletstats.enableCPUUsageMetrics=true
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      memory_limiter:
        check_interval: 5s
        limit_mib: 800
        spike_limit_mib: 200
      batch:
        timeout: 10s
        send_batch_size: 10000
        send_batch_max_size: 15000
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.container.name
            - k8s.node.name
            - k8s.deployment.name
      resource/cluster:
        attributes:
          - key: cluster.name
            value: homelab
            action: upsert
    exporters:
      prometheusremotewrite:
        endpoint: http://192.168.4.79:9090/api/v1/write
        sending_queue:
          enabled: true
          num_consumers: 3
          queue_size: 1000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
    service:
      pipelines:
        metrics:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - k8sattributes
            - resource/cluster
            - batch
          exporters:
            - prometheusremotewrite
      telemetry:
        metrics:
          address: 0.0.0.0:8888
