apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-gateway
  namespace: monitoring
spec:
  mode: statefulset
  replicas: 1
  serviceAccount: otel-collector-gateway
  image: otel/opentelemetry-collector-contrib:0.123.0
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      memory: 1Gi
  # TargetAllocator configuration for annotation-driven pod scrape
  targetAllocator:
    enabled: true
    image: ghcr.io/open-telemetry/opentelemetry-operator/target-allocator:0.122.0
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
    # Discover pods with prometheus.io/scrape: "true" annotations
    prometheusCR:
      enabled: true
  config: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      # The prometheus receiver scrape config is managed by the TargetAllocator.
      # The placeholder job definition is replaced with dynamic targets at runtime.
      prometheus:
        config:
          scrape_configs:
            - job_name: 'otel-gateway'
              scrape_interval: 30s

    processors:
      memory_limiter:
        check_interval: 5s
        limit_mib: 800
        spike_limit_mib: 200
      batch:
        timeout: 10s
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.container.name
            - k8s.node.name
            - k8s.deployment.name
      resource/cluster:
        attributes:
          - key: cluster.name
            value: homelab
            action: upsert

    exporters:
      fluentforward:
        endpoint: "fluentbit-aggregator:24224"
      prometheusremotewrite:
        endpoint: "http://192.168.4.79:9090/api/v1/write"
        # No auth for homelab simplicity. Prometheus is on a trusted LAN.
        # If basic auth is enabled on Prometheus, add:
        #   auth:
        #     authenticator: basicauth/prw
        # tls:
        #   insecure: true

    service:
      pipelines:
        metrics:
          receivers: [otlp, prometheus]
          processors: [memory_limiter, k8sattributes, resource/cluster, batch]
          exporters: [prometheusremotewrite]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resource/cluster, batch]
          exporters: [fluentforward]
      telemetry:
        metrics:
          address: "0.0.0.0:8888"
