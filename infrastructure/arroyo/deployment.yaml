apiVersion: apps/v1
kind: Deployment
metadata:
  name: arroyo
  namespace: monitoring
  labels:
    app.kubernetes.io/name: arroyo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: arroyo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: arroyo
    spec:
      containers:
        - name: arroyo
          # Pin to a specific tag after first successful deployment
          image: ghcr.io/arroyosystems/arroyo:0.15.0
          ports:
            - containerPort: 5115
              name: api
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # No ARROYO__ env vars — unknown fields crash the process.
          # Pipeline configuration via the Arroyo API/UI after startup.
          volumeMounts:
            - name: config
              mountPath: /etc/arroyo
          readinessProbe:
            httpGet:
              path: /api/v1/ping
              port: 5115
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/ping
              port: 5115
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: arroyo-config
