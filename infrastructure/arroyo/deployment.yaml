apiVersion: apps/v1
kind: Deployment
metadata:
  name: arroyo
  namespace: monitoring
  labels:
    app.kubernetes.io/name: arroyo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: arroyo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: arroyo
    spec:
      containers:
        - name: arroyo
          # Pin to a specific tag after first successful deployment
          image: ghcr.io/arroyosystems/arroyo:latest
          ports:
            - containerPort: 8000
              name: api
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: ARROYO__KAFKA_BOOTSTRAP_SERVERS
              value: "tansu-broker.monitoring.svc.cluster.local:9092"
            - name: ARROYO__ICEBERG_CATALOG_URI
              value: "http://tansu-broker.monitoring.svc.cluster.local:8181"
            - name: ARROYO__ICEBERG_WAREHOUSE
              value: "s3://logs/iceberg"
          volumeMounts:
            - name: config
              mountPath: /etc/arroyo
          readinessProbe:
            httpGet:
              path: /api/v1/status
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/status
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: arroyo-config
