apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coredns-custom
  namespace: argocd
  annotations:
    # Wave 0 — debe sincronizarse antes que cualquier app que dependa de
    # resolución DNS hacia Scaleway (Tansu, fluentbit, etc.)
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/manudiv16/homelab.git
    targetRevision: main
    path: infrastructure/coredns-custom
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
