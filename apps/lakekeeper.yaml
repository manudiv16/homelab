apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lakekeeper
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  sources:
    # Source 1: Official Lakekeeper Helm chart
    - repoURL: https://lakekeeper.github.io/lakekeeper-charts/
      targetRevision: 0.9.0
      chart: lakekeeper
      helm:
        valueFiles:
          - $values/infrastructure/lakekeeper/values.yaml
    # Source 2: Our repo for Helm values file reference
    - repoURL: https://github.com/manudiv16/homelab.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
