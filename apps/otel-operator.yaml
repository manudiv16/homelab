apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    # Local vendored manifest from upstream release v0.122.0
    # The upstream kustomize (config/default) uses a placeholder image reference
    # ("controller") that doesn't resolve via ArgoCD's kustomize support.
    # Using the pre-built release manifest avoids this issue entirely.
    repoURL: https://github.com/manudiv16/homelab.git
    targetRevision: main
    path: infrastructure/otel-operator-manifest
  destination:
    server: https://kubernetes.default.svc
    namespace: opentelemetry-operator-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
