apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure-base
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ${REPO_URL}
    targetRevision: main
    path: infrastructure/base
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: infrastructure
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
